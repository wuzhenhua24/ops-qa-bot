# ops-qa-bot 配置文件模板
# 复制为 config.toml 后填入实际值。config.toml 已被 .gitignore。
# 所有字段都可以通过环境变量覆盖，优先级：环境变量 > 本文件 > 默认值。
# 这样 app_secret 这类敏感信息也可以只走环境变量，不写进文件。

# 文档根目录（相对或绝对路径）。env: DOCS_ROOT
docs_root = "./docs"

[feishu]
app_id     = "cli_xxxxxxxxxxxxxxxx"   # env: FEISHU_APP_ID (必填)
app_secret = "xxxxxxxxxxxxxxxx"       # env: FEISHU_APP_SECRET (必填)

# 可选：事件订阅的 Verification Token（飞书开放平台"事件与回调"页配置的）
verify_token = ""                     # env: FEISHU_VERIFY_TOKEN

# 可选：消息卡片回调的 Verification Token，默认回退到上面的 verify_token
card_verify_token = ""                # env: FEISHU_CARD_VERIFY_TOKEN

[server]
host = "0.0.0.0"                      # env: HOST
port = 8000                           # env: PORT

[session]
idle_ttl = 1800                       # env: SESSION_IDLE_TTL（秒，默认 30 分钟）

[admin]
# /admin/* 接口保护 token。不设时接口开放（适合纯内网部署）。
token = ""                            # env: ADMIN_TOKEN

[logging]
main_log     = "./logs/ops_qa_bot.log"  # env: LOG_FILE
feedback_log = "./logs/feedback.log"    # env: FEEDBACK_LOG
